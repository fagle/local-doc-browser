<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>可米 KomiOS</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Markdown 文件列表">
        <div class="brand">
          <div>
            <h1>可米 KomiOS</h1>
            <p>NAS 私有内容桌面</p>
          </div>
          <div class="brand-actions">
            <button id="recentToggle" class="recent-button" type="button">最近</button>
            <button id="logout" class="recent-button" type="button">退出</button>
            <button id="themeToggle" class="icon-button" type="button" title="切换主题" aria-label="切换主题">
              <span aria-hidden="true">◐</span>
            </button>
          </div>
        </div>

        <div id="recentPopover" class="recent-popover" hidden>
          <div class="recent-header">
            <span>最近打开</span>
            <button id="clearRecent" type="button">清空</button>
          </div>
          <div id="recentList" class="recent-list"></div>
        </div>

        <div class="path-panel">
          <div class="path-navigator" aria-label="当前路径">
            <div id="pathBreadcrumbs" class="path-breadcrumbs"></div>
            <button id="editPath" class="path-edit-button" type="button">更改</button>
          </div>
          <div id="pathEditor" class="path-editor">
            <input id="folderPath" class="path-input" type="text" placeholder="D:\docs" autocomplete="off" />
            <button id="openFolder" class="primary-button" type="button">打开</button>
          </div>
        </div>

        <label class="search-box" for="searchInput">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="搜索文件名或正文" autocomplete="off" />
        </label>

        <div class="file-meta">
          <span id="fileCount">未打开文件夹</span>
          <button id="closeWorkspace" type="button">关闭</button>
        </div>

        <div class="mobile-album-nav" aria-label="移动端相册导航">
          <button id="mobileAlbumToggle" type="button">相册</button>
          <button id="mobileAlbumBrowse" type="button">切换</button>
          <span id="mobileAlbumLabel"></span>
        </div>

        <div id="parentNav" class="parent-nav" aria-label="上级目录"></div>
        <nav id="fileList" class="file-list" aria-label="文档"></nav>

        <div id="mobileAlbumSheet" class="mobile-album-sheet" hidden>
          <button id="mobileAlbumScrim" class="mobile-album-scrim" type="button" aria-label="关闭相册切换"></button>
          <section class="mobile-album-panel" aria-label="切换相册">
            <header class="mobile-album-header">
              <div>
                <span>相册</span>
                <strong>切换文件夹</strong>
              </div>
              <button id="mobileAlbumClose" type="button">关闭</button>
            </header>
            <div id="mobileAlbumContent" class="mobile-album-content"></div>
          </section>
        </div>
      </aside>

      <div id="splitter" class="splitter" role="separator" aria-orientation="vertical" aria-label="调整列表宽度" tabindex="0"></div>

      <main class="preview-panel">
        <header class="preview-header">
          <div>
            <p id="docPath" class="doc-path">未选择文档</p>
            <h2 id="docTitle">打开一个 Markdown 文件夹</h2>
          </div>
          <div class="preview-actions">
            <div id="htmlMode" class="segmented-control" hidden>
              <button id="htmlPreviewMode" class="active" type="button">预览</button>
              <button id="htmlSourceMode" type="button">源码</button>
            </div>
            <button id="copyMarkdown" type="button">复制源码</button>
            <button id="downloadHtml" type="button">下载 HTML</button>
            <button id="mediaInfo" type="button" hidden>编码信息</button>
            <button id="transcodeVideo" type="button" hidden>转码播放</button>
            <button id="downloadFile" type="button">下载</button>
          </div>
        </header>

        <article id="preview" class="markdown-preview" tabindex="0"></article>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
